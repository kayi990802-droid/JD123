<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINDE | 管理員審核中心</title>
    
    <!-- 核心安全閘口：90天自動防停權檢查 -->
    <script>
        (function() {
            const isVerified = localStorage.getItem('jinde_verified');
            const loginTimestamp = localStorage.getItem('jinde_login_timestamp');
            const ninetyDaysMs = 90 * 24 * 60 * 60 * 1000;
            const now = Date.now();

            if (isVerified !== 'true') {
                window.location.replace('login.html');
                return;
            }

            if (loginTimestamp && (now - parseInt(loginTimestamp) > ninetyDaysMs)) {
                localStorage.clear();
                alert('【安全提示】登入已過期（超過90天），請重新驗證。');
                window.location.replace('login.html?reason=expired');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card-enter { animation: slideUp 0.4s ease-out forwards; opacity: 0; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- 標頭區 -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-1 h-4 bg-teal-500 rounded-full"></span>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Security Audit</span>
                </div>
                <h2 class="text-3xl font-black tracking-tighter">待審核成員名單</h2>
            </div>
            <button onclick="loadPending()" class="text-slate-400 hover:text-teal-600 transition p-2">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <!-- 列表區 -->
        <div id="list" class="space-y-3">
            <!-- 載入中的骨架屏 -->
            <div class="bg-white p-6 rounded-3xl border border-slate-100 animate-pulse">
                <div class="h-4 bg-slate-100 w-1/3 rounded mb-2"></div>
                <div class="h-3 bg-slate-50 w-1/2 rounded"></div>
            </div>
        </div>

        <!-- 底部返回 -->
        <div class="mt-12 text-center">
            <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition flex items-center justify-center gap-2">
                <i class="fas fa-chevron-left"></i> 返回工程管理中台
            </a>
        </div>
    </div>

    <script>
        const S_URL = 'https://wdpxgichzvfebhlukbrl.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkcHhnaWNoenZmZWJobHVrYnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjExMzQsImV4cCI6MjA4NDU5NzEzNH0.--85I0A-7WKt0P-ex1Zdnb8UVspuMNshzQtNaLedKq0';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function loadPending() {
            const listDiv = document.getElementById('list');
            
            try {
                const { data, error } = await _supabase
                    .from('staff')
                    .select('*')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                listDiv.innerHTML = '';

                if (error) throw error;

                if (data.length === 0) {
                    listDiv.innerHTML = `
                        <div class="text-center py-20 bg-white rounded-[40px] border border-dashed border-slate-200">
                            <i class="fas fa-user-check text-slate-200 text-5xl mb-4"></i>
                            <p class="text-slate-400 font-bold">目前沒有任何待審核申請</p>
                        </div>
                    `;
                    return;
                }

                data.forEach((user, index) => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 flex justify-between items-center card-enter";
                    card.style.animationDelay = `${index * 0.1}s`;
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300">
                                <i class="fas fa-user text-xl"></i>
                            </div>
                            <div>
                                <p class="font-black text-slate-800 text-lg">${user.name || '未提供名稱'}</p>
                                <p class="text-xs font-mono text-slate-400 uppercase tracking-tighter">${user.email || '無電子郵件'}</p>
                            </div>
                        </div>
                        <button onclick="approve(this, '${user.id}')" 
                                class="bg-slate-900 hover:bg-teal-600 text-white px-6 py-3 rounded-2xl text-xs font-black transition-all active:scale-95 shadow-lg shadow-slate-200">
                            核准入系統
                        </button>
                    `;
                    listDiv.appendChild(card);
                });
            } catch (err) {
                listDiv.innerHTML = `<p class="text-rose-500 text-center font-bold">錯誤：${err.message}</p>`;
            }
        }

        async function approve(btn, id) {
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';
            btn.classList.add('opacity-50');

            try {
                const { error } = await _supabase
                    .from('staff')
                    .update({ status: 'active' })
                    .eq('id', id);

                if (error) throw error;

                // 成功動畫
                btn.classList.remove('bg-slate-900', 'opacity-50');
                btn.classList.add('bg-emerald-500');
                btn.innerHTML = '<i class="fas fa-check"></i>';

                setTimeout(() => {
                    loadPending();
                }, 800);

            } catch (err) {
                alert('核准失敗：' + err.message);
                btn.disabled = false;
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-50');
            }
        }

        window.onload = loadPending;
    </script>
</body>
</html>
