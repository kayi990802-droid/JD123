<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINDE | 錦德工程管理中台</title>
    
    <!-- [1] 權限安全檢查 -->
    <script>
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (!isLocal && localStorage.getItem('jinde_verified') !== 'true') {
            window.location.replace('login.html');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- [2] 載入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --sidebar-bg: #1a222d;
            --brand-teal: #0d9488;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            height: 100vh; 
            display: flex; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 50; 
        }

        .nav-link { 
            padding: 14px 24px; 
            font-size: 14px; 
            color: #94a3b8; 
            transition: all 0.2s ease; 
            border-left: 4px solid transparent; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            white-space: nowrap; 
        }
        
        .nav-link:hover, .nav-link.active { 
            background: #242e3d; 
            color: white; 
            border-left-color: var(--brand-teal); 
        }

        .main-stage { flex-grow: 1; display: flex; flex-direction: column; background: #fdfdfd; overflow: hidden; }
        .top-header { height: 70px; border-bottom: 1px solid #edf2f7; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: white; flex-shrink: 0; }
        .content-scroll { padding: 30px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }

        .action-card { 
            background: white; 
            border: 1px solid #f1f5f9; 
            padding: 24px; 
            border-radius: 28px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }
        .action-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); 
            border-color: var(--brand-teal); 
        }

        .icon-circle { 
            width: 52px; height: 52px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; 
        }

        @media (max-width: 1024px) {
            .sidebar { width: 70px; }
            .sidebar .nav-text, .sidebar h1, .sidebar p { display: none; }
            .nav-link { justify-content: center; padding: 20px 0; }
            .nav-link i { margin: 0 !important; font-size: 18px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-8">
            <h1 class="text-2xl font-black tracking-tighter">JINDE<span class="text-teal-500">.</span></h1>
            <p id="user-display" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">錦德管理員</p>
        </div>
        
        <nav class="flex-grow">
            <a href="index.html" class="nav-link active"><i class="fas fa-th-large mr-3 w-5"></i><span class="nav-text">中台總覽</span></a>
            <a href="customer.html" class="nav-link"><i class="far fa-address-book mr-3 w-5"></i><span class="nav-text">客戶管理</span></a>
            <a href="project.html" class="nav-link"><i class="fas fa-hammer mr-3 w-5"></i><span class="nav-text">案場進度</span></a>
            <a href="staff.html" class="nav-link"><i class="fas fa-users-cog mr-3 w-5"></i><span class="nav-text">人員核算</span></a>
            <a href="quote.html" class="nav-link"><i class="fas fa-file-invoice-dollar mr-3 w-5"></i><span class="nav-text">報價系統</span></a>
            <a href="finance.html" class="nav-link"><i class="fas fa-chart-line mr-3 w-5"></i><span class="nav-text">財務中心</span></a>
        </nav>

        <div class="p-6 border-t border-slate-800/50">
            <div class="flex items-center gap-2 mb-1">
                <span id="status-dot" class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"></span>
                <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase">Supabase Online</span>
            </div>
            <div class="text-[9px] text-slate-600 font-mono tracking-tighter">
                SESSION: <span id="logout-timer">30:00</span>
            </div>
        </div>
    </aside>

    <main class="main-stage">
        <header class="top-header">
            <div class="flex items-center gap-2">
                <span class="w-1 h-4 bg-teal-500 rounded-full"></span>
                <h2 class="text-sm font-black text-slate-800 tracking-widest uppercase">Management Hub</h2>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="live-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter"></p>
                    <p id="live-time" class="text-sm font-black text-slate-800 font-mono"></p>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-rose-600 hover:bg-rose-50 transition border border-slate-100 active:scale-90">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <div class="content-scroll">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- 核心看板 -->
                <div class="col-span-2 bg-slate-900 rounded-[32px] p-8 text-white flex justify-between items-center relative overflow-hidden group cursor-pointer" onclick="location.href='calendar.html'">
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
                            <span class="text-teal-400 text-[10px] font-black uppercase tracking-widest">Live Schedule</span>
                        </div>
                        <h3 class="text-2xl font-black mb-1">今日派工排程</h3>
                        <p class="text-slate-400 text-xs">即時查看各案場施工人力配置</p>
                    </div>
                    <i class="fas fa-calendar-check text-8xl text-white/5 absolute -right-4 -bottom-4 group-hover:scale-110 group-hover:text-teal-500/10 transition duration-700"></i>
                </div>

                <!-- 功能卡片 -->
                <div class="action-card" onclick="location.href='customer.html'">
                    <div class="icon-circle bg-blue-50 text-blue-600"><i class="far fa-address-book"></i></div>
                    <h3 class="font-black text-sm text-slate-800">客戶管理</h3>
                    <p class="text-[10px] text-slate-400 leading-relaxed">業主、協力廠商資料</p>
                </div>

                <div class="action-card" onclick="location.href='project.html'">
                    <div class="icon-circle bg-orange-50 text-orange-600"><i class="fas fa-hard-hat"></i></div>
                    <h3 class="font-black text-sm text-slate-800">案場進度</h3>
                    <p class="text-[10px] text-slate-400 leading-relaxed">工地進度與階段驗收</p>
                </div>

                <div class="action-card" onclick="location.href='staff.html'">
                    <div class="icon-circle bg-indigo-50 text-indigo-600"><i class="fas fa-user-clock"></i></div>
                    <h3 class="font-black text-sm text-slate-800">人員核算</h3>
                    <p class="text-[10px] text-slate-400 leading-relaxed">師傅點工與薪資統計</p>
                </div>

                <div class="action-card" onclick="location.href='quote.html'">
                    <div class="icon-circle bg-emerald-50 text-emerald-600"><i class="fas fa-file-invoice-dollar"></i></div>
                    <h3 class="font-black text-sm text-slate-800">報價系統</h3>
                    <p class="text-[10px] text-slate-400 leading-relaxed">工項快速報價產出</p>
                </div>
                
                <!-- 其他按鈕可照舊新增 -->
            </div>
        </div>

        <footer class="p-6 border-t border-slate-100 flex justify-between items-center bg-white text-[9px] text-slate-300 font-black uppercase tracking-[0.4em]">
            <span>JINDE ENGINEERING CLOUD Hub</span>
            <span class="hidden sm:inline">V5.1.0 - Connected Cluster</span>
        </footer>
    </main>

    <script>
        // ==========================================
        // [3] 使用你提供的最新憑證初始化 Supabase
        // ==========================================
        const SUPABASE_URL = 'https://nbkjntzlwdhqconhskpv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_1jpNK-6m9XwLpoMnSQe-og_N4sULqYH'; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 自動維護：每隔 1 分鐘檢查一次連線
        async function checkConnection() {
            try {
                const { error } = await _supabase.from('profiles').select('id', { count: 'exact', head: true }).limit(1);
                if (error) throw error;
                document.getElementById('status-dot').className = "w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]";
                document.getElementById('status-text').innerText = "Supabase Online";
            } catch (err) {
                console.error("連線中斷:", err);
                document.getElementById('status-dot').className = "w-2 h-2 bg-red-500 rounded-full shadow-[0_0_8px_#f43f5e]";
                document.getElementById('status-text').innerText = "DB Connection Lost";
            }
        }

        // ==========================================
        // [4] 核心功能 (時間、計時、登出)
        // ==========================================
        let timeLeft = 1800; 

        function updateClock() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        function logout(isAuto = false) {
            if(!isAuto && !confirm('確定要安全登出錦德管理系統？')) return;
            localStorage.clear();
            window.location.replace('login.html');
        }

        function startTimers() {
            setInterval(updateClock, 1000);
            setInterval(checkConnection, 60000); // 每一分鐘自動檢測資料庫
            setInterval(() => {
                if (timeLeft <= 0) logout(true);
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                const timerDisplay = document.getElementById('logout-timer');
                timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft < 300) timerDisplay.classList.add('text-rose-500', 'font-black');
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            startTimers();
            checkConnection();
            document.getElementById('user-display').innerText = localStorage.getItem('user_name') || '錦德管理員';
        });
    </script>
</body>
</html>
