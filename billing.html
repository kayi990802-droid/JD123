<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JINDE 錦德防水 | 專業請款系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: #1e293b; padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .a4-page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 20px auto; background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        input { border-bottom: 1px solid #e2e8f0 !important; outline: none; background: transparent; transition: all 0.2s; }
        input:focus { border-bottom: 2px solid #0d9488 !important; background: #f0fdfa; }
        
        .del-col { width: 44px; text-align: center; }
        .del-btn { color: #ef4444; cursor: pointer; padding: 10px; transition: 0.2s; }
        
        .bank-info { 
            margin-top: 30px; padding: 15px; border-radius: 12px; 
            background: #f8fafc; border: 1px solid #e2e8f0; font-size: 13px;
        }

        @media print {
            .no-print, .sticky-header, .del-col, .del-btn { display: none !important; }
            body { background: white; }
            .a4-page { margin: 0; box-shadow: none; width: 210mm; page-break-after: always; }
            input { border: none !important; }
            .empty-row { display: none !important; }
            table { width: 100% !important; }
        }

        @media screen and (max-width: 768px) {
            .a4-page { width: 98%; padding: 12px; margin: 5px auto; border-radius: 8px; }
            .top-btn-text { display: none; }
            input { font-size: 16px !important; } /* 防止 iOS 自動放大 */
            .text-4xl { font-size: 1.875rem; }
            .bank-info { padding: 10px; font-size: 12px; }
        }
        
        .empty-row { display: none; }
        .has-data { display: table-row !important; }
        .calc-has-data { display: flex !important; }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="text-white bg-slate-700 w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-600 active:scale-90 transition">
                <i class="fas fa-sync-alt"></i>
            </button>
            <span class="text-white font-black italic text-xl tracking-tighter">JINDE.</span>
        </div>
        <div class="flex gap-2">
            <button onclick="addRow()" class="bg-slate-500 text-white px-4 py-2 rounded-xl font-bold active:scale-90 transition flex items-center">
                <i class="fas fa-plus"></i><span class="top-btn-text ml-2">加行</span>
            </button>
            <button onclick="handleUpload()" id="syncBtn" class="bg-teal-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg active:scale-90 transition flex items-center">
                <i class="fas fa-cloud-upload-alt"></i><span class="top-btn-text ml-2">存檔</span>
            </button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg active:scale-90 transition flex items-center">
                <i class="fas fa-print"></i><span class="top-btn-text ml-2">PDF</span>
            </button>
        </div>
    </div>

    <main class="p-1 md:p-4">
        <div class="a4-page">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter text-slate-900">JINDE.</h1>
                    <p class="text-teal-600 font-bold text-[10px] tracking-[0.2em] mt-1">錦德防水工程行</p>
                </div>
                <div class="text-right">
                    <p id="billSerial" class="font-mono text-[10px] font-bold text-slate-400"></p>
                    <p class="text-slate-100 font-black text-2xl uppercase italic">Invoice</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="space-y-2">
                    <input type="text" id="projName" placeholder="案場名稱..." class="text-lg font-bold w-full">
                    <input type="text" id="cliName" placeholder="客戶名稱..." class="w-full text-sm">
                </div>
                <div class="md:text-right space-y-1 text-sm text-slate-500">
                    <p class="flex md:justify-end items-center">日期: <input type="text" id="billDate" class="md:text-right w-28 font-bold text-slate-800 border-none ml-2"></p>
                    <input type="text" id="locName" placeholder="施工地址..." class="md:text-right w-full text-xs">
                </div>
            </div>

            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white text-[9px] uppercase">
                        <th class="py-2 del-col no-print"></th>
                        <th class="text-left pl-2">項目說明</th>
                        <th class="w-10 text-center">單位</th>
                        <th class="w-16 text-right">數量</th>
                        <th class="w-20 text-right">單價</th>
                        <th class="w-24 text-right pr-2">小計</th>
                    </tr>
                </thead>
                <tbody id="invoiceBody"></tbody>
            </table>

            <div class="flex flex-col md:flex-row justify-between items-end gap-4 mt-8">
                <div class="bank-info w-full md:w-3/5">
                    <p class="text-teal-700 font-black mb-1 text-[10px] uppercase tracking-wider"><i class="fas fa-university mr-2"></i>匯款資訊</p>
                    <div class="grid grid-cols-2 gap-x-2 font-bold text-slate-700 text-xs">
                        <p>合庫太平 (006)</p>
                        <p>戶名：錦德工程行</p>
                        <p class="col-span-2">帳號：1128717728840</p>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[9px] font-black text-teal-600 block uppercase tracking-widest">Grand Total</span>
                    <span id="totalDisplay" class="text-4xl font-black font-mono tracking-tighter text-slate-900">0</span>
                    <p id="chineseAmt" class="text-[10px] text-slate-400 font-bold mt-1">零元整</p>
                </div>
            </div>
        </div>

        <div class="a4-page">
            <h2 class="text-lg font-black italic border-b-2 border-slate-900 pb-2 mb-4">CALCULATION DETAILS <span class="text-[10px] font-normal text-slate-400 ml-2">算法附件</span></h2>
            <div id="calcBody"></div>
        </div>
    </main>

    <script>
        // ... (Script 邏輯保持不變)
        // 僅需確保 addRow 中 tr 增加 class 'has-data' 的邏輯正確
    </script>
</body>
</html>
